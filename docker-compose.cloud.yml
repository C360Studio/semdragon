# Compose override for cloud LLM providers (Gemini, Anthropic, OpenAI).
# Usage: docker compose -f docker-compose.yml -f docker-compose.cloud.yml up -d
#
# The base compose mockllm service uses profiles: ["mock"], so it is
# automatically excluded when this override is used (no --profile mock).
#
# Examples:
#   make up-cloud                                       # Gemini (default)
#   SEMDRAGONS_CONFIG=/etc/semdragons/semdragons-e2e-anthropic.json make up-cloud

services:
  backend:
    environment:
      SEMDRAGONS_NATS_URLS: nats://nats:4222
      SEMDRAGONS_CONFIG: "${SEMDRAGONS_CONFIG:-/etc/semdragons/semdragons-e2e-gemini.json}"
      SEED_E2E: "${SEED_E2E:-false}"
      SEED_AGENTS: "${SEED_AGENTS:-true}"
      SEMDRAGONS_API_KEY: "${SEMDRAGONS_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
