# Compose override for cloud LLM providers (Gemini, Anthropic, OpenAI).
# Usage: docker compose -f docker-compose.yml -f docker-compose.cloud.yml up -d
#
# The base compose mockllm service uses profiles: ["mock"], so it is
# automatically excluded when this override is used (no --profile mock).
#
# Only overrides that differ from the base docker-compose.yml are listed here.
# The base already declares NATS URLs, SEED_E2E, API keys, etc.
#
# Examples:
#   make up-cloud                                       # Gemini (default)
#   SEMDRAGONS_E2E_CONFIG=semdragons-e2e-anthropic.json make up-cloud

services:
  backend:
    environment:
      SEMDRAGONS_CONFIG: /etc/semdragons/${SEMDRAGONS_E2E_CONFIG:-semdragons-e2e-gemini.json}
      SEMDRAGONS_LOG_LEVEL: "${SEMDRAGONS_LOG_LEVEL:-info}"
