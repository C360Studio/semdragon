# Compose override for local Ollama LLM.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ollama.yml up -d
#
# The base compose mockllm service uses profiles: ["mock"], so it is
# automatically excluded when this override is used (no --profile mock).
#
# Requires Ollama running on the host: ollama serve && ollama pull qwen2.5-coder:7b

services:
  backend:
    environment:
      SEMDRAGONS_NATS_URLS: nats://nats:4222
      SEMDRAGONS_CONFIG: /etc/semdragons/semdragons-e2e-ollama.json
      SEED_E2E: "${SEED_E2E:-false}"
      SEED_AGENTS: "${SEED_AGENTS:-true}"
      SEMDRAGONS_API_KEY: "${SEMDRAGONS_API_KEY:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
