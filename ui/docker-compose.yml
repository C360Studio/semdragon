services:
  nats:
    image: nats:2.12-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--config", "/etc/nats/nats-server.conf"]
    volumes:
      - nats-data:/data
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: ui/Dockerfile.backend
    depends_on:
      nats:
        condition: service_healthy
    environment:
      SEMDRAGONS_NATS_URLS: nats://nats:4222
      SEED_E2E: "${SEED_E2E:-false}"
      SEMDRAGONS_API_KEY: "${SEMDRAGONS_API_KEY:-}"
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8080
      PUBLIC_API_URL: ""
      PUBLIC_SSE_BUCKET: semdragons-local-dev-board1
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src:ro
      - ./static:/app/static:ro
    stdin_open: true
    tty: true

volumes:
  nats-data:
