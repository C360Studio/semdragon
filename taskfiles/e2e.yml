version: "3"

vars:
  BACKEND_PORT: '{{.BACKEND_PORT | default "8081"}}'
  COMPOSE: docker compose -f docker/compose.yml

tasks:
  install:
    desc: Install Playwright browsers
    dir: ui
    cmds:
      - npx playwright install --with-deps chromium

  default:
    desc: Run E2E tests with mock LLM
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { CONFIG: semdragons-e2e.json, PROFILE: mock }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=chromium
        ignore_error: true
      - task: stack:down

  gemini:
    desc: Run E2E with Gemini
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { CONFIG: semdragons-e2e-gemini.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=gemini BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=chromium
        ignore_error: true
      - task: stack:down

  anthropic:
    desc: Run E2E with Anthropic Claude
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { CONFIG: semdragons-e2e-anthropic.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=anthropic BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=chromium
        ignore_error: true
      - task: stack:down

  openai:
    desc: Run E2E with OpenAI
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { CONFIG: semdragons-e2e-openai.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=openai BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=chromium
        ignore_error: true
      - task: stack:down

  ollama:
    desc: Run E2E with local Ollama
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { CONFIG: semdragons-e2e-ollama.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=ollama BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=chromium
        ignore_error: true
      - task: stack:down

  run:
    desc: Run Playwright tests against running stack
    dir: ui
    cmds:
      - E2E_LLM_MODE={{.MODE | default "mock"}} BACKEND_PORT={{.BACKEND_PORT}} npx playwright test {{.CLI_ARGS}} --project=chromium

  spec:
    desc: "Run single spec: task e2e:spec -- quest-lifecycle"
    dir: ui
    cmds:
      - E2E_LLM_MODE={{.MODE | default "mock"}} BACKEND_PORT={{.BACKEND_PORT}} npx playwright test {{.CLI_ARGS}} --project=chromium

  headed:
    desc: Run E2E in headed browser mode
    cmds:
      - task: install
      - task: stack:up
        vars: { CONFIG: semdragons-e2e.json, PROFILE: mock }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --headed
        ignore_error: true
      - task: stack:down

  ui:
    desc: Open Playwright UI mode
    cmds:
      - task: install
      - task: stack:up
        vars: { CONFIG: semdragons-e2e.json, PROFILE: mock }
      - task: wait
      - cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --ui

  report:
    desc: Open last Playwright report
    dir: ui
    cmds:
      - npx playwright show-report

  # Internal helpers

  stack:up:
    internal: true
    cmds:
      - >-
        SEED_E2E=true
        BACKEND_PORT={{.BACKEND_PORT}}
        SEMDRAGONS_E2E_CONFIG={{.CONFIG}}
        {{.COMPOSE}} {{if .PROFILE}}--profile {{.PROFILE}}{{end}}
        up -d --build --wait

  stack:down:
    internal: true
    cmds:
      - "{{.COMPOSE}} --profile mock down -v --remove-orphans"

  clean:
    internal: true
    cmds:
      - cmd: "{{.COMPOSE}} --profile mock down -v --remove-orphans 2>/dev/null"
        ignore_error: true

  wait:
    internal: true
    cmds:
      - |
        echo "Waiting for backend health..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:{{.BACKEND_PORT}}/health > /dev/null 2>&1; then
            echo "Backend healthy after ${i}s"
            break
          fi
          sleep 1
        done
