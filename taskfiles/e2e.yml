version: "3"

vars:
  BACKEND_PORT: '{{.BACKEND_PORT | default "8081"}}'
  UI_PORT: '{{.UI_PORT | default "5174"}}'
  COMPOSE: docker compose -f docker/compose.yml
  TIER1_CONFIG: /etc/semdragons/semdragons-e2e-tier1.json

tasks:
  install:
    desc: Install Playwright browsers
    dir: ui
    cmds:
      - npx playwright install --with-deps chromium

  default:
    desc: Run E2E tests with mock LLM (both tiers, clean state between)
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock, CONFIG: "{{.TIER1_CONFIG}}" }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier1
        ignore_error: true
      # Tier 2 needs clean state — tier 1 creates agents, quests, and triggers
      # agentic loops that pollute the board. Rebuild from scratch.
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  tier0:
    desc: Run Tier 0 cross-browser UI tests (no backend required)
    cmds:
      - task: install
      - cmd: cd ui && npx playwright test --project=chromium --project=firefox --project=webkit
        ignore_error: true

  tier1:
    desc: Run Tier 1 tests only (serial, UI + API state, no agentic loop)
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock, CONFIG: "{{.TIER1_CONFIG}}" }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier1
        ignore_error: true
      - task: maybe:down

  tier2:
    desc: Run Tier 2 scenario tests only (serial, 1 worker)
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  gemini:
    desc: Run Tier 2 scenario tests with Gemini
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/gemini.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=gemini BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  anthropic:
    desc: Run Tier 2 scenario tests with Anthropic Claude
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/anthropic.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=anthropic BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  openai:
    desc: Run Tier 2 scenario tests with OpenAI
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/openai.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=openai BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  ollama:
    desc: Run Tier 2 scenario tests with local Ollama
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/ollama.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=ollama BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  hybrid:
    desc: Run Tier 2 scenario tests with Gemini+Claude hybrid
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mixed-gemini-claude.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=hybrid BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  # Epic Tier 3 — real LLM only, exercises full party quest DAG pipeline

  epic:gemini:
    desc: Run Epic Tier 3 tests with Gemini + semsource (OSH knowledge graph)
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/gemini.json, PROFILE: semsource, CONFIG: /etc/semdragons/semdragons-semsource.json, SEMSOURCE_CONFIG: semsource-osh.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=gemini BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier3-epic
        ignore_error: true
      - task: maybe:down

  epic:anthropic:
    desc: Run Epic Tier 3 tests with Anthropic Claude + semsource (OSH knowledge graph)
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/anthropic.json, PROFILE: semsource, CONFIG: /etc/semdragons/semdragons-semsource.json, SEMSOURCE_CONFIG: semsource-osh.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=anthropic BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier3-epic
        ignore_error: true
      - task: maybe:down

  epic:openai:
    desc: Run Epic Tier 3 tests with OpenAI + semsource (OSH knowledge graph)
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/openai.json, PROFILE: semsource, CONFIG: /etc/semdragons/semdragons-semsource.json, SEMSOURCE_CONFIG: semsource-osh.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=openai BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier3-epic
        ignore_error: true
      - task: maybe:down

  epic:hybrid:
    desc: Run Epic Tier 3 tests with Gemini+Claude hybrid + semsource (OSH knowledge graph)
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mixed-gemini-claude.json, PROFILE: semsource, CONFIG: /etc/semdragons/semdragons-semsource.json, SEMSOURCE_CONFIG: semsource-osh.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=hybrid BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier3-epic
        ignore_error: true
      - task: maybe:down

  # The Pros — pre-leveled Expert+ roster for lab use

  pros:
    desc: "Launch clean instance with The Pros roster (Expert+ agents, Gemini skill-routed)"
    cmds:
      - task: install
      - task: clean
      - task: seed:repos
      - >-
        {{.COMPOSE}} build {{if eq (env "NO_CACHE") "1"}}--no-cache{{end}}
      - >-
        SEED_PROS=true
        SEED_E2E=false
        SEED_AGENTS=false
        BACKEND_PORT={{.BACKEND_PORT}}
        UI_PORT={{.UI_PORT}}
        SEMDRAGONS_MODELS=/etc/semdragons/models/pros.json
        {{if ne (env "DEBUG") ""}}SEMDRAGONS_LOG_LEVEL=debug{{end}}
        {{.COMPOSE}} up -d --wait
      - task: wait
      - echo "The Pros ready at http://localhost:{{.UI_PORT}}"

  pros:gemini:
    desc: "Tier 3 epic (Meshtastic) with The Pros roster (Gemini, skill-routed)"
    cmds:
      - task: install
      - task: clean
      - task: seed:repos
      - >-
        {{.COMPOSE}} --profile semsource
        build {{if eq (env "NO_CACHE") "1"}}--no-cache{{end}}
      - >-
        SEED_PROS=true
        SEED_E2E=false
        SEED_AGENTS=false
        BACKEND_PORT={{.BACKEND_PORT}}
        UI_PORT={{.UI_PORT}}
        SEMDRAGONS_MODELS=/etc/semdragons/models/pros.json
        SEMDRAGONS_CONFIG=/etc/semdragons/semdragons-semsource.json
        SEMSOURCE_CONFIG=semsource-osh.json
        {{if ne (env "DEBUG") ""}}SEMDRAGONS_LOG_LEVEL=debug{{end}}
        {{.COMPOSE}} --profile semsource up -d --wait
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=gemini SEED_PROS=true BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier3-epic
        ignore_error: true
      - task: maybe:down

  pros:anthropic:
    desc: "Tier 3 epic (Meshtastic) with The Pros roster (Anthropic Claude, skill-routed)"
    cmds:
      - task: install
      - task: clean
      - task: seed:repos
      - >-
        {{.COMPOSE}} --profile semsource
        build {{if eq (env "NO_CACHE") "1"}}--no-cache{{end}}
      - >-
        SEED_PROS=true
        SEED_E2E=false
        SEED_AGENTS=false
        BACKEND_PORT={{.BACKEND_PORT}}
        UI_PORT={{.UI_PORT}}
        SEMDRAGONS_MODELS=/etc/semdragons/models/pros-anthropic.json
        SEMDRAGONS_CONFIG=/etc/semdragons/semdragons-semsource.json
        SEMSOURCE_CONFIG=semsource-osh.json
        {{if ne (env "DEBUG") ""}}SEMDRAGONS_LOG_LEVEL=debug{{end}}
        {{.COMPOSE}} --profile semsource up -d --wait
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=anthropic SEED_PROS=true BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --project=tier3-epic
        ignore_error: true
      - task: maybe:down

  mock:
    desc: Start mock E2E stack (use with e2e:spec to run individual specs)
    cmds:
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock }
      - task: wait
      - cmd: echo "Mock stack ready. Run specs with{{":"}} task e2e:spec -- <spec-name>"

  mock:down:
    desc: Tear down mock E2E stack
    cmds:
      - task: stack:down

  run:
    desc: Run Playwright tests against running stack
    dir: ui
    cmds:
      - E2E_LLM_MODE={{.MODE | default "mock"}} BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test {{.CLI_ARGS}}

  spec:
    desc: "Run single spec: task e2e:spec -- quest-lifecycle"
    dir: ui
    cmds:
      - E2E_LLM_MODE={{.MODE | default "mock"}} BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test {{.CLI_ARGS}}

  headed:
    desc: Run E2E in headed browser mode
    cmds:
      - task: install
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --headed
        ignore_error: true
      - task: maybe:down

  ui:
    desc: Open Playwright UI mode
    cmds:
      - task: install
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock }
      - task: wait
      - cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} UI_PORT={{.UI_PORT}} npx playwright test --ui

  report:
    desc: Open last Playwright report
    dir: ui
    cmds:
      - npx playwright show-report

  # Internal helpers

  stack:up:
    internal: true
    cmds:
      - task: seed:repos
      - >-
        {{.COMPOSE}} {{if .PROFILE}}--profile {{.PROFILE}}{{end}}
        build {{if eq (env "NO_CACHE") "1"}}--no-cache{{end}}
      - >-
        SEED_E2E=true
        BACKEND_PORT={{.BACKEND_PORT}}
        UI_PORT={{.UI_PORT}}
        SEMDRAGONS_MODELS={{.MODELS}}
        {{if .CONFIG}}SEMDRAGONS_CONFIG={{.CONFIG}}{{end}}
        {{if .SEMSOURCE_CONFIG}}SEMSOURCE_CONFIG={{.SEMSOURCE_CONFIG}}{{end}}
        {{if ne (env "DEBUG") ""}}SEMDRAGONS_LOG_LEVEL=debug{{end}}
        {{.COMPOSE}} {{if .PROFILE}}--profile {{.PROFILE}}{{end}}
        up -d --wait

  seed:repos:
    desc: Create test repo for E2E sandbox integration
    internal: true
    cmds:
      - |
        REPO_DIR=docker/repos/testrepo
        if [ -d "$REPO_DIR/.git" ]; then
          echo "Test repo already exists at $REPO_DIR"
          exit 0
        fi
        mkdir -p "$REPO_DIR"
        cd "$REPO_DIR"
        git init -b main
        git config user.name "e2e-seed"
        git config user.email "e2e@semdragons"
        echo "# Test Repo" > README.md
        echo "E2E test repository for sandbox git integration." >> README.md
        mkdir -p src
        cat > src/main.py << 'PYEOF'
        def hello():
            return "Hello from testrepo"

        if __name__ == "__main__":
            print(hello())
        PYEOF
        git add .
        git commit -m "initial commit: README + src/main.py"
        echo "Test repo seeded at $REPO_DIR"

  stack:down:
    internal: true
    cmds:
      - "{{.COMPOSE}} --profile mock --profile semsource down -v --remove-orphans"

  clean:
    internal: true
    cmds:
      - cmd: "{{.COMPOSE}} --profile mock --profile semsource down -v --remove-orphans 2>/dev/null"
        ignore_error: true
      # Reset test repo to initial commit — prevents stale git history from
      # accumulating across E2E runs (semsource indexes all commits on startup).
      - cmd: |
          REPO_DIR=docker/repos/testrepo
          if [ -d "$REPO_DIR/.git" ]; then
            INITIAL=$(git -C "$REPO_DIR" rev-list --max-parents=0 HEAD 2>/dev/null)
            if [ -n "$INITIAL" ]; then
              git -C "$REPO_DIR" reset --hard "$INITIAL" 2>/dev/null
              git -C "$REPO_DIR" clean -fdx 2>/dev/null
              git -C "$REPO_DIR" checkout -B main 2>/dev/null
            fi
          fi
        ignore_error: true

  maybe:down:
    internal: true
    cmds:
      - cmd: '{{if eq (env "DEBUG") ""}}{{.COMPOSE}} --profile mock --profile semsource down -v --remove-orphans{{else}}echo "DEBUG set — stack left running"{{end}}'

  wait:
    internal: true
    cmds:
      - |
        echo "Waiting for backend health..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:{{.BACKEND_PORT}}/health > /dev/null 2>&1; then
            echo "Backend healthy after ${i}s"
            break
          fi
          sleep 1
        done
