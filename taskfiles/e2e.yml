version: "3"

vars:
  BACKEND_PORT: '{{.BACKEND_PORT | default "8081"}}'
  COMPOSE: docker compose -f docker/compose.yml
  TIER1_CONFIG: /etc/semdragons/semdragons-e2e-tier1.json

tasks:
  install:
    desc: Install Playwright browsers
    dir: ui
    cmds:
      - npx playwright install --with-deps chromium

  default:
    desc: Run E2E tests with mock LLM (both tiers, clean state between)
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock, CONFIG: "{{.TIER1_CONFIG}}" }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier1
        ignore_error: true
      # Tier 2 needs clean state — tier 1 creates agents, quests, and triggers
      # agentic loops that pollute the board. Rebuild from scratch.
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  tier0:
    desc: Run Tier 0 cross-browser UI tests (no backend required)
    cmds:
      - task: install
      - cmd: cd ui && npx playwright test --project=chromium --project=firefox --project=webkit
        ignore_error: true

  tier1:
    desc: Run Tier 1 tests only (parallel, fast, autonomy off)
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock, CONFIG: "{{.TIER1_CONFIG}}" }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier1
        ignore_error: true
      - task: maybe:down

  tier2:
    desc: Run Tier 2 scenario tests only (serial, 1 worker)
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  gemini:
    desc: Run E2E with Gemini
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/gemini.json, CONFIG: "{{.TIER1_CONFIG}}" }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=gemini BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier1
        ignore_error: true
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/gemini.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=gemini BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  anthropic:
    desc: Run E2E with Anthropic Claude
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/anthropic.json, CONFIG: "{{.TIER1_CONFIG}}" }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=anthropic BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier1
        ignore_error: true
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/anthropic.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=anthropic BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  openai:
    desc: Run E2E with OpenAI
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/openai.json, CONFIG: "{{.TIER1_CONFIG}}" }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=openai BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier1
        ignore_error: true
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/openai.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=openai BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  ollama:
    desc: Run E2E with local Ollama
    cmds:
      - task: install
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/ollama.json, CONFIG: "{{.TIER1_CONFIG}}" }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=ollama BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier1
        ignore_error: true
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/ollama.json }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=ollama BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --project=tier2-scenarios
        ignore_error: true
      - task: maybe:down

  mock:
    desc: Start mock E2E stack (use with e2e:spec to run individual specs)
    cmds:
      - task: clean
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock }
      - task: wait
      - cmd: echo "Mock stack ready. Run specs with{{":"}} task e2e:spec -- <spec-name>"

  mock:down:
    desc: Tear down mock E2E stack
    cmds:
      - task: stack:down

  run:
    desc: Run Playwright tests against running stack
    dir: ui
    cmds:
      - E2E_LLM_MODE={{.MODE | default "mock"}} BACKEND_PORT={{.BACKEND_PORT}} npx playwright test {{.CLI_ARGS}}

  spec:
    desc: "Run single spec: task e2e:spec -- quest-lifecycle"
    dir: ui
    cmds:
      - E2E_LLM_MODE={{.MODE | default "mock"}} BACKEND_PORT={{.BACKEND_PORT}} npx playwright test {{.CLI_ARGS}}

  headed:
    desc: Run E2E in headed browser mode
    cmds:
      - task: install
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock }
      - task: wait
      - cmd: cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --headed
        ignore_error: true
      - task: maybe:down

  ui:
    desc: Open Playwright UI mode
    cmds:
      - task: install
      - task: stack:up
        vars: { MODELS: /etc/semdragons/models/mock.json, PROFILE: mock }
      - task: wait
      - cd ui && E2E_LLM_MODE=mock BACKEND_PORT={{.BACKEND_PORT}} npx playwright test --ui

  report:
    desc: Open last Playwright report
    dir: ui
    cmds:
      - npx playwright show-report

  # Internal helpers

  stack:up:
    internal: true
    cmds:
      - >-
        SEED_E2E=true
        BACKEND_PORT={{.BACKEND_PORT}}
        SEMDRAGONS_MODELS={{.MODELS}}
        {{if .CONFIG}}SEMDRAGONS_CONFIG={{.CONFIG}}{{end}}
        {{if ne (env "DEBUG") ""}}SEMDRAGONS_LOG_LEVEL=debug{{end}}
        {{.COMPOSE}} {{if .PROFILE}}--profile {{.PROFILE}}{{end}}
        up -d --build --wait

  stack:down:
    internal: true
    cmds:
      - "{{.COMPOSE}} --profile mock down -v --remove-orphans"

  clean:
    internal: true
    cmds:
      - cmd: "{{.COMPOSE}} --profile mock down -v --remove-orphans 2>/dev/null"
        ignore_error: true

  maybe:down:
    internal: true
    cmds:
      - cmd: '{{if eq (env "DEBUG") ""}}{{.COMPOSE}} --profile mock down -v --remove-orphans{{else}}echo "DEBUG set — stack left running"{{end}}'

  wait:
    internal: true
    cmds:
      - |
        echo "Waiting for backend health..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:{{.BACKEND_PORT}}/health > /dev/null 2>&1; then
            echo "Backend healthy after ${i}s"
            break
          fi
          sleep 1
        done
