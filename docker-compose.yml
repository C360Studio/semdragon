services:
  nats:
    image: nats:2.12-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--config", "/etc/nats/nats-server.conf"]
    volumes:
      - nats-data:/data
      - ./docker/nats-server.conf:/etc/nats/nats-server.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  mockllm:
    profiles: ["mock"]
    build:
      context: .
      dockerfile: docker/mockllm.Dockerfile
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    depends_on:
      nats:
        condition: service_healthy
      mockllm:
        condition: service_healthy
        required: false
    environment:
      SEMDRAGONS_NATS_URLS: nats://nats:4222
      SEMDRAGONS_CONFIG: /etc/semdragons/${SEMDRAGONS_E2E_CONFIG:-semdragons-e2e.json}
      SEED_E2E: "${SEED_E2E:-false}"
      SEED_AGENTS: "${SEED_AGENTS:-true}"
      SEMDRAGONS_API_KEY: "${SEMDRAGONS_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      SEMDRAGONS_DEBUG: "${SEMDRAGONS_DEBUG:-false}"
      SEMDRAGONS_DEBUG_PORT: "6060"
    ports:
      - "8080:8080"
      - "36060:6060"
    volumes:
      - ${WORKSPACE:-./.workspace}:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8080
      PUBLIC_API_URL: ""
    ports:
      - "5173:5173"
    volumes:
      - ./ui/src:/app/src:ro
      - ./ui/static:/app/static:ro
    stdin_open: true
    tty: true

  caddy:
    image: caddy:2-alpine
    depends_on:
      - backend
      - ui
    ports:
      - "80:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

volumes:
  nats-data:
