services:
  nats:
    image: nats:2.12-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--config", "/etc/nats/nats-server.conf"]
    volumes:
      - nats-data:/data
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  mockllm:
    profiles: ["mock"]
    build:
      context: ..
      dockerfile: docker/mockllm.Dockerfile
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  semembed:
    image: ghcr.io/c360studio/semembed:latest
    ports:
      - "8083:8081"
    environment:
      - SEMEMBED_MODEL=BAAI/bge-small-en-v1.5
      - SEMEMBED_PORT=8081
      - RUST_LOG=info
    volumes:
      - semembed-cache:/home/semembed/.cache/fastembed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  sandbox:
    image: ghcr.io/c360studio/semdragon/sandbox:latest
    build:
      context: ..
      dockerfile: docker/sandbox.Dockerfile
    volumes:
      - workspaces:/workspace
      - ${REPOS_DIR:-./repos}:/repos:rw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    depends_on:
      nats:
        condition: service_healthy
      mockllm:
        condition: service_healthy
        required: false
      sandbox:
        condition: service_healthy
      semembed:
        condition: service_healthy
        required: false
    environment:
      SEMDRAGONS_NATS_URLS: nats://nats:4222
      SEMDRAGONS_CONFIG: "${SEMDRAGONS_CONFIG:-/etc/semdragons/semdragons.json}"
      SEMDRAGONS_MODELS: "${SEMDRAGONS_MODELS:-}"
      SEMDRAGONS_LOG_LEVEL: "${SEMDRAGONS_LOG_LEVEL:-info}"
      SEED_E2E: "${SEED_E2E:-false}"
      SEED_AGENTS: "${SEED_AGENTS:-true}"
      SEMDRAGONS_API_KEY: "${SEMDRAGONS_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      BRAVE_SEARCH_API_KEY: "${BRAVE_SEARCH_API_KEY:-}"
      SEMDRAGONS_DEBUG: "${SEMDRAGONS_DEBUG:-false}"
      SEMDRAGONS_DEBUG_PORT: "6060"
      SANDBOX_URL: http://sandbox:8090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8081}:8080"
      - "36060:6060"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  ui:
    build:
      context: ../ui
      dockerfile: ../docker/ui.Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8080
      PUBLIC_API_URL: ""
    ports:
      - "${UI_PORT:-5174}:5173"
    volumes:
      - ../ui/src:/app/src:ro
      - ../ui/static:/app/static:ro
    stdin_open: true
    tty: true

  caddy:
    image: caddy:2-alpine
    depends_on:
      - backend
      - ui
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

  # ── semsource (optional) ───────────────────────────────────
  nats-semsource:
    profiles: ["semsource"]
    image: nats:2.12-alpine
    command: ["-js", "-m", "8222", "--name", "semsource-nats"]
    volumes:
      - nats-semsource-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Local semsource: indexes sandbox repos on our NATS.
  # Headless mode — semdragons owns graph components, semsource only does ingest.
  local-semsource:
    image: ghcr.io/c360studio/semsource:latest
    command:
      - run
      - --config
      - /etc/semsource/semsource-local.json
      - --log-level
      - ${SEMSOURCE_LOG_LEVEL:-info}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
      # Allow git operations on repos owned by a different user (host bind mount).
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: "*"
    volumes:
      - ./semsource-local.json:/etc/semsource/semsource-local.json:ro
      - ${REPOS_DIR:-./repos}:/sources:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 3s
      retries: 3

  # External semsource (e.g., OSH) — profile-gated, uses separate NATS.
  semsource:
    profiles: ["semsource"]
    image: ghcr.io/c360studio/semsource:latest
    command:
      - run
      - --config
      - /etc/semsource/${SEMSOURCE_CONFIG:-semsource-local.json}
      - --log-level
      - ${SEMSOURCE_LOG_LEVEL:-info}
    depends_on:
      nats-semsource:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats-semsource:4222
      SEMSOURCE_WS_BIND: "0.0.0.0:7890"
      SEMSOURCE_GIT_TOKEN: "${SEMSOURCE_GIT_TOKEN:-}"
    volumes:
      - ./semsource-osh.json:/etc/semsource/semsource-osh.json:ro
      - ./semsource-workspace.json:/etc/semsource/semsource-workspace.json:ro
      - ./semsource-local.json:/etc/semsource/semsource-local.json:ro
      - ${REPOS_DIR:-./repos}:/sources:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  nats-data:
  nats-semsource-data:
  semembed-cache:
  workspaces:
